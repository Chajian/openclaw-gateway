<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 消息网关实现原理 - 交互式可视化</title>
  <style>
    :root {
      --primary: #26C6DA;
      --primary-dark: #00ACC1;
      --blue: #42A5F5;
      --purple: #7C4DFF;
      --green: #66BB6A;
      --orange: #FF9800;
      --red: #FF7043;
      --pink: #AB47BC;
      --gray-100: #F5F5F5;
      --gray-200: #EEEEEE;
      --gray-300: #E0E0E0;
      --gray-500: #9E9E9E;
      --gray-700: #616161;
      --gray-900: #212121;
      --gradient: linear-gradient(135deg, #26C6DA 0%, #42A5F5 50%, #7C4DFF 100%);
      --code-bg: #1e1e2e;
      --code-fg: #cdd6f4;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Microsoft YaHei',sans-serif;background:var(--gray-100);min-height:100vh;color:var(--gray-900)}
    .dashboard{max-width:1480px;margin:0 auto;padding:14px}
    .title{text-align:center;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2em;padding:14px 20px 2px;font-weight:800}
    .subtitle{text-align:center;color:var(--gray-500);font-size:.92em;margin-bottom:14px}
    .dashboard-body{display:grid;grid-template-columns:260px 1fr;gap:12px}
    .card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:18px}

    /* Sidebar */
    .sidebar{position:sticky;top:12px;align-self:start;max-height:93vh;overflow-y:auto;padding:14px}
    .sidebar h3{font-size:.8em;color:var(--gray-500);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px}
    .sidebar h3:first-child{margin-top:0}
    .step-nav{list-style:none}
    .step-nav li{display:flex;align-items:flex-start;gap:9px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:background .2s;margin-bottom:1px;font-size:.87em;line-height:1.35}
    .step-nav li:hover{background:var(--gray-100)}
    .step-nav li.active{background:#E0F7FA;font-weight:600}
    .step-nav li.completed .dot{background:var(--green)}
    .step-nav li.active .dot{background:var(--primary);box-shadow:0 0 0 3px rgba(38,198,218,.25)}
    .dot{width:9px;height:9px;min-width:9px;border-radius:50%;background:var(--gray-300);margin-top:4px;transition:all .3s}
    .key-hint{margin-top:14px;padding:10px;background:var(--gray-100);border-radius:8px;font-size:.76em;color:var(--gray-500);line-height:1.8}
    .key-hint kbd{background:white;border:1px solid var(--gray-300);border-radius:4px;padding:1px 5px;font-family:inherit;font-size:.9em}

    /* Main */
    .main-area{display:flex;flex-direction:column;gap:12px;min-width:0}
    .diagram-wrap{position:relative;overflow:hidden;min-height:240px;display:flex;align-items:center;justify-content:center}
    .main-svg{width:100%;height:260px}
    .svc-label{font-size:12px;font-weight:700;fill:white;text-anchor:middle;pointer-events:none}
    .svc-sub{font-size:9.5px;fill:rgba(255,255,255,.85);text-anchor:middle;pointer-events:none}
    .arrow{stroke-width:2;fill:none;transition:all .4s}
    @keyframes dashFlow{to{stroke-dashoffset:-20}}
    .flowing{stroke-dasharray:8 4;animation:dashFlow .8s linear infinite}

    /* Step */
    .step-title-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .step-num{background:var(--primary);color:white;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9em;flex-shrink:0}
    .step-title-text{font-size:1.15em;font-weight:700}
    .desc{color:var(--gray-700);line-height:1.75;font-size:.93em;margin-bottom:10px}
    .desc strong{color:var(--gray-900)}

    /* Code */
    .code-block{background:var(--code-bg);color:var(--code-fg);border-radius:10px;overflow:hidden;margin:10px 0;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:.82em}
    .code-hdr{background:#313244;padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
    .code-hdr span{color:#a6adc8;font-size:.85em}
    .copy-btn{background:none;border:1px solid #585b70;color:#a6adc8;padding:2px 9px;border-radius:5px;cursor:pointer;font-size:.82em;transition:all .2s}
    .copy-btn:hover{background:#585b70;color:white}
    .code-body{padding:12px 14px;overflow-x:auto;line-height:1.7;white-space:pre}
    .cm{color:#6c7086} .kw{color:#cba6f7} .fn{color:#89b4fa} .str{color:#a6e3a1} .num{color:#fab387} .var{color:#f9e2af} .op{color:#89dceb} .tp{color:#f38ba8}
    .hl{background:rgba(137,180,250,.1);display:inline-block;width:100%;margin:0 -14px;padding:0 14px}

    /* Info */
    .info{border-radius:10px;padding:12px 14px;margin:10px 0;font-size:.88em;line-height:1.6;display:flex;gap:10px;align-items:flex-start}
    .info.tip{background:#E8F5E9;border-left:4px solid var(--green)}
    .info.warn{background:#FFF8E1;border-left:4px solid var(--orange)}
    .info.note{background:#E3F2FD;border-left:4px solid var(--blue)}
    .info.idea{background:#F3E5F5;border-left:4px solid var(--pink)}
    .info .ico{font-size:1.15em;flex-shrink:0;margin-top:1px}

    /* Table */
    .tbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:.86em;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200)}
    .tbl th{background:#f0f4f8;padding:9px 12px;text-align:left;font-weight:600;color:var(--gray-700)}
    .tbl td{padding:9px 12px;border-top:1px solid var(--gray-200)}
    .tbl tr:hover td{background:#fafbfc}
    .tbl code{background:#f0f4f8;padding:1px 5px;border-radius:3px;font-size:.92em}

    /* Lifecycle */
    .lifecycle{display:flex;align-items:stretch;gap:0;margin:14px 0;overflow-x:auto;padding:8px 0;justify-content:center}
    .lc-node{flex:0 1 120px;min-width:100px;padding:12px 8px;text-align:center;border-radius:10px;position:relative;transition:all .4s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
    .lc-node .lc-icon{font-size:1.5em}
    .lc-node .lc-title{font-weight:700;font-size:.82em;color:white}
    .lc-node .lc-desc{font-size:.7em;color:rgba(255,255,255,.8)}
    .lc-arrow{display:flex;align-items:center;color:var(--gray-300);font-size:1.3em;min-width:24px;justify-content:center;transition:all .4s}
    .lc-node.active-lc{transform:scale(1.06);box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:1}
    .lc-node.dim-lc{opacity:.3}
    .lc-arrow.dim-lc{opacity:.15}

    /* Tag */
    .tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.75em;font-weight:600;margin-left:4px;vertical-align:middle}
    .tag-lib{background:#E3F2FD;color:#1565C0}
    .tag-done{background:#E8F5E9;color:#2E7D32}

    /* Controls */
    .controls-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;flex-wrap:wrap}
    .btn{padding:8px 16px;border:none;border-radius:8px;background:var(--primary);color:white;cursor:pointer;font-size:.86em;transition:all .2s;font-weight:500}
    .btn:hover{opacity:.85;transform:translateY(-1px)}
    .btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .btn-sec{background:var(--gray-500)}
    .step-ind{font-size:.86em;color:var(--gray-500);font-weight:500;min-width:85px;text-align:center}
    .prog{width:170px;accent-color:var(--primary)}
    .spd{padding:6px 8px;border:1px solid var(--gray-300);border-radius:8px;font-size:.82em;background:white;cursor:pointer}
    @media(max-width:900px){.dashboard-body{grid-template-columns:1fr}.sidebar{position:static;max-height:none}}
  </style>
</head>
<body>
<div class="dashboard">
  <h1 class="title">OpenClaw 消息网关实现原理</h1>
  <p class="subtitle">基于 grammy + @larksuiteoapi 的多渠道 AI 对话平台 | ← → 切换步骤 | 空格键 播放</p>
  <div class="dashboard-body">
    <div class="card sidebar">
      <h3>章节导航</h3>
      <ul class="step-nav" id="stepNav"></ul>
      <div class="key-hint"><kbd>←</kbd> <kbd>→</kbd> 切换<br><kbd>Space</kbd> 播放/暂停<br><kbd>Home</kbd> <kbd>End</kbd> 首/末</div>
    </div>
    <div class="main-area">
      <div class="card" id="vizCard"><div class="diagram-wrap" id="vizArea"></div></div>
      <div class="card" id="stepContent"></div>
      <div class="card controls-bar">
        <button class="btn btn-sec" id="prevBtn" onclick="prevStep()">&#9664; 上一步</button>
        <button class="btn" id="playBtn" onclick="togglePlay()">&#9654; 播放</button>
        <button class="btn btn-sec" id="nextBtn" onclick="nextStep()">下一步 &#9654;</button>
        <span class="step-ind" id="stepInd">1/10</span>
        <input type="range" class="prog" id="progBar" min="0" max="9" value="0" oninput="goToStep(+this.value)">
        <select class="spd" onchange="setSpeed(+this.value)"><option value="3500">慢速</option><option value="2200" selected>正常</option><option value="1000">快速</option></select>
        <button class="btn btn-sec" onclick="goToStep(0)">&#x27F2; 重置</button>
      </div>
    </div>
  </div>
</div>
<script>
const S = `
<defs>
  <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#9E9E9E"/></marker>
  <marker id="ahc" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#26C6DA"/></marker>
  <marker id="ahg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#66BB6A"/></marker>
  <marker id="aho" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#FF9800"/></marker>
  <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".12"/></filter>
</defs>`;

const STEPS = [
  // 0 - Real Architecture
  {
    nav: '真实架构总览',
    title: '系统全景：两个项目如何协作',
    viz() {
      return `<svg viewBox="0 0 880 280" class="main-svg" style="height:280px">${S}
        <!-- openclaw 主程序 -->
        <rect x="160" y="12" width="420" height="250" rx="14" fill="none" stroke="#7C4DFF" stroke-width="2.5"/>
        <text x="370" y="6" font-size="12" font-weight="800" fill="#7C4DFF" text-anchor="middle">openclaw 主程序（插件架构）</text>
        <!-- Plugins -->
        <rect x="180" y="30" width="100" height="50" rx="8" fill="#42A5F5" filter="url(#sh)"/>
        <text x="230" y="53" class="svc-label" style="font-size:10px">Telegram</text>
        <text x="230" y="68" class="svc-sub">grammy</text>
        <rect x="180" y="92" width="100" height="50" rx="8" fill="#AB47BC" filter="url(#sh)"/>
        <text x="230" y="115" class="svc-label" style="font-size:10px">飞书 / Lark</text>
        <text x="230" y="130" class="svc-sub">@larksuiteoapi</text>
        <rect x="180" y="154" width="100" height="44" rx="8" fill="#78909C" filter="url(#sh)"/>
        <text x="230" y="175" class="svc-label" style="font-size:10px">Slack/Discord/...</text>
        <text x="230" y="190" class="svc-sub">40+ 渠道</text>
        <!-- Core -->
        <rect x="310" y="35" width="120" height="42" rx="8" fill="#7C4DFF" filter="url(#sh)"/>
        <text x="370" y="55" class="svc-label" style="font-size:10px">Plugin Router</text>
        <text x="370" y="68" class="svc-sub">消息路由 + 会话管理</text>
        <rect x="310" y="92" width="120" height="42" rx="8" fill="#FF7043" filter="url(#sh)"/>
        <text x="370" y="112" class="svc-label" style="font-size:10px">Agent / LLM</text>
        <text x="370" y="125" class="svc-sub">多 Provider 调用</text>
        <rect x="310" y="150" width="120" height="42" rx="8" fill="#66BB6A" filter="url(#sh)"/>
        <text x="370" y="170" class="svc-label" style="font-size:10px">Config Loader</text>
        <text x="370" y="183" class="svc-sub">openclaw.json</text>
        <!-- Streaming -->
        <rect x="460" y="60" width="100" height="75" rx="8" fill="#FF9800" filter="url(#sh)"/>
        <text x="510" y="85" class="svc-label" style="font-size:10px">Streaming</text>
        <text x="510" y="100" class="svc-sub">流式回复</text>
        <text x="510" y="115" class="svc-sub">Draft 编辑</text>
        <!-- History -->
        <rect x="460" y="155" width="100" height="40" rx="8" fill="#26C6DA" filter="url(#sh)"/>
        <text x="510" y="177" class="svc-label" style="font-size:10px">Session</text>
        <text x="510" y="190" class="svc-sub">对话历史</text>
        <!-- Arrows inside -->
        <line x1="280" y1="55" x2="308" y2="55" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#ah)"/>
        <line x1="280" y1="117" x2="308" y2="113" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#ah)"/>
        <line x1="430" y1="113" x2="458" y2="100" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#ah)"/>
        <line x1="430" y1="170" x2="458" y2="170" stroke="#9E9E9E" stroke-width="1.5" marker-end="url(#ah)"/>

        <!-- Users left -->
        <rect x="10" y="40" width="105" height="45" rx="8" fill="#0088CC" filter="url(#sh)"/>
        <text x="62" y="62" class="svc-label">Telegram</text>
        <text x="62" y="75" class="svc-sub">用户消息</text>
        <rect x="10" y="100" width="105" height="45" rx="8" fill="#3370FF" filter="url(#sh)"/>
        <text x="62" y="122" class="svc-label">飞书</text>
        <text x="62" y="135" class="svc-sub">用户消息</text>
        <line x1="115" y1="62" x2="178" y2="55" stroke="#42A5F5" stroke-width="2" marker-end="url(#ahc)" class="flowing"/>
        <line x1="115" y1="122" x2="178" y2="117" stroke="#AB47BC" stroke-width="2" marker-end="url(#ahc)" class="flowing"/>

        <!-- LLM APIs right -->
        <rect x="620" y="40" width="115" height="42" rx="8" fill="#FF9800" filter="url(#sh)"/>
        <text x="677" y="60" class="svc-label" style="font-size:10px">OpenAI / Claude</text>
        <text x="677" y="73" class="svc-sub">LLM API</text>
        <line x1="560" y1="97" x2="618" y2="65" stroke="#FF7043" stroke-width="2" marker-end="url(#aho)" class="flowing"/>

        <!-- claw / key-orchestrator bottom -->
        <rect x="615" y="130" width="250" height="130" rx="12" fill="none" stroke="#66BB6A" stroke-width="2" stroke-dasharray="5 3"/>
        <text x="740" y="124" font-size="11" font-weight="700" fill="#2E7D32" text-anchor="middle">claw 辅助管线</text>
        <rect x="635" y="145" width="105" height="42" rx="8" fill="#66BB6A" filter="url(#sh)"/>
        <text x="687" y="164" class="svc-label" style="font-size:9px">Key Orchestrator</text>
        <text x="687" y="178" class="svc-sub">同步 Key</text>
        <rect x="755" y="145" width="95" height="42" rx="8" fill="#78909C" filter="url(#sh)"/>
        <text x="802" y="164" class="svc-label" style="font-size:9px">Monitor</text>
        <text x="802" y="178" class="svc-sub">LinuxDo 福利</text>
        <rect x="635" y="200" width="105" height="42" rx="8" fill="#FFA726" filter="url(#sh)"/>
        <text x="687" y="218" class="svc-label" style="font-size:9px">openclaw.json</text>
        <text x="687" y="232" class="svc-sub">共享配置</text>
        <line x1="687" y1="187" x2="687" y2="198" stroke="#66BB6A" stroke-width="1.5" marker-end="url(#ahg)"/>
        <!-- config → openclaw -->
        <line x1="635" y1="221" x2="432" y2="175" stroke="#FFA726" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#aho)"/>
        <text x="540" y="194" font-size="9" fill="#E65100" text-anchor="middle">读取 Key</text>
      </svg>`;
    },
    content: `
      <p class="desc">OpenClaw 的消息网关<strong>不是</strong> <code>claw/gateway/</code>（那只是一个占位 stub）。
      真正处理 Telegram/飞书消息的是<strong>独立的 openclaw 主程序</strong>，一个基于<strong>插件架构</strong>的多渠道 AI 对话平台。</p>
      <table class="tbl">
        <tr><th>项目</th><th>职责</th><th>技术栈</th></tr>
        <tr><td><strong style="color:#7C4DFF">openclaw 主程序</strong></td><td>接收消息 → Agent → 调 LLM → 流式回复</td><td>TypeScript + grammy + @larksuiteoapi</td></tr>
        <tr><td><strong style="color:#66BB6A">claw/key-orchestrator</strong></td><td>从 new-api 站点同步 Key → 写入 openclaw.json</td><td>TypeScript strict + pnpm + Zod + tslog</td></tr>
        <tr><td><strong style="color:#78909C">claw/monitor</strong></td><td>监控 LinuxDo 福利 → 推送 Telegram</td><td>TypeScript ESM + tsx</td></tr>
        <tr><td><strong style="color:#9E9E9E">claw/gateway (stub)</strong></td><td>Docker 健康检查占位，未来可能实现独立网关</td><td>Node.js HTTP</td></tr>
      </table>
      <div class="info idea">
        <span class="ico">&#128273;</span>
        <div><strong>两个项目的桥梁：</strong><code>openclaw.json</code> 配置文件。Key Orchestrator 写入最新的 API Key，
        openclaw 主程序读取并用它调用 LLM。通过<strong>共享文件</strong>解耦，零 RPC。</div>
      </div>`
  },
  // 1 - Plugin Architecture
  {
    nav: '插件架构',
    title: '插件系统：40+ 渠道的统一抽象',
    viz() {
      return `<svg viewBox="0 0 860 250" class="main-svg" style="height:250px">${S}
        <!-- Plugin Host -->
        <rect x="300" y="10" width="260" height="230" rx="14" fill="none" stroke="#7C4DFF" stroke-width="2"/>
        <text x="430" y="4" font-size="11" font-weight="700" fill="#7C4DFF" text-anchor="middle">OpenClaw Plugin Host</text>
        <rect x="320" y="28" width="100" height="35" rx="6" fill="#7C4DFF" filter="url(#sh)"/>
        <text x="370" y="49" class="svc-label" style="font-size:10px">Plugin API</text>
        <rect x="440" y="28" width="100" height="35" rx="6" fill="#FF7043" filter="url(#sh)"/>
        <text x="490" y="49" class="svc-label" style="font-size:10px">Agent Runtime</text>
        <rect x="320" y="78" width="220" height="35" rx="6" fill="#26C6DA" filter="url(#sh)"/>
        <text x="430" y="99" class="svc-label" style="font-size:10px">Channel Registry — registerChannel()</text>
        <rect x="320" y="128" width="220" height="35" rx="6" fill="#FF9800" filter="url(#sh)"/>
        <text x="430" y="149" class="svc-label" style="font-size:10px">Tool Registry — registerTools()</text>
        <rect x="320" y="180" width="220" height="42" rx="6" fill="#66BB6A" filter="url(#sh)"/>
        <text x="430" y="200" class="svc-label" style="font-size:10px">Gateway Lifecycle</text>
        <text x="430" y="214" class="svc-sub">start() / stop() / probe()</text>

        <!-- Extensions left -->
        <rect x="30" y="25" width="220" height="42" rx="8" fill="#42A5F5" filter="url(#sh)"/>
        <text x="140" y="44" class="svc-label">extensions/telegram/</text>
        <text x="140" y="58" class="svc-sub">grammy + @grammyjs/runner</text>
        <rect x="30" y="80" width="220" height="42" rx="8" fill="#AB47BC" filter="url(#sh)"/>
        <text x="140" y="99" class="svc-label">extensions/feishu/</text>
        <text x="140" y="113" class="svc-sub">@larksuiteoapi/node-sdk</text>
        <rect x="30" y="135" width="220" height="42" rx="8" fill="#5865F2" filter="url(#sh)"/>
        <text x="140" y="154" class="svc-label">extensions/slack/</text>
        <text x="140" y="168" class="svc-sub">@slack/bolt</text>
        <rect x="30" y="190" width="220" height="42" rx="8" fill="#78909C" filter="url(#sh)"/>
        <text x="140" y="209" class="svc-label">extensions/discord/ ...</text>
        <text x="140" y="223" class="svc-sub">40+ 渠道插件</text>

        <!-- Arrows -->
        <line x1="250" y1="46" x2="318" y2="43" stroke="#42A5F5" stroke-width="2" marker-end="url(#ah)"/>
        <line x1="250" y1="101" x2="318" y2="93" stroke="#AB47BC" stroke-width="2" marker-end="url(#ah)"/>
        <line x1="250" y1="156" x2="318" y2="135" stroke="#5865F2" stroke-width="2" marker-end="url(#ah)"/>
        <line x1="250" y1="211" x2="318" y2="190" stroke="#78909C" stroke-width="2" marker-end="url(#ah)"/>

        <!-- Register call -->

        <div><strong>claw 技术栈已全面升级：</strong>所有 <code>.mjs</code> 已迁移为 <strong>TypeScript strict</strong>，
        包管理从 npm 切换到 <strong>pnpm</strong> workspace，新增 <strong>Zod</strong> 配置校验、<strong>tslog</strong> 结构化日志、
        <strong>Vitest</strong> 测试套件（43 个测试覆盖核心模块）。Docker 容器通过 <code>npx tsx</code> 直接运行 <code>.ts</code> 文件，无需编译步骤。</div>
      </div>
      <div class="info idea">
        <span class="ico">&#127919;</span>
        <div><strong>Gateway stub 的未来：</strong>当前 Bot 逻辑在 openclaw 主程序里。未来如果需要把 Bot 也容器化并水平扩展，
        <code>claw/gateway</code> 就可以从 stub 演进为独立的 HTTP 网关，接收 Webhook 并分发给多个 Agent 实例。</div>
      </div>`
  }
];

const totalSteps = STEPS.length;
let currentStep = 0, isPlaying = false, playTimer = null, playSpeed = 2200;

function nextStep(){if(currentStep<totalSteps-1){currentStep++;render()}}
function prevStep(){if(currentStep>0){currentStep--;render()}}
function goToStep(n){currentStep=Math.max(0,Math.min(n,totalSteps-1));render()}
function togglePlay(){
  isPlaying=!isPlaying;
  if(isPlaying){playTimer=setInterval(()=>{if(currentStep<totalSteps-1)nextStep();else togglePlay()},playSpeed)}
  else clearInterval(playTimer);
  document.getElementById('playBtn').innerHTML=isPlaying?'&#9646;&#9646; 暂停':'&#9654; 播放';
}
function setSpeed(s){playSpeed=s;if(isPlaying){clearInterval(playTimer);playTimer=setInterval(()=>{if(currentStep<totalSteps-1)nextStep();else togglePlay()},playSpeed)}}
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if(e.key==='ArrowLeft')prevStep();else if(e.key==='ArrowRight')nextStep();
  else if(e.key===' '){e.preventDefault();togglePlay()}
  else if(e.key==='Home')goToStep(0);else if(e.key==='End')goToStep(totalSteps-1);
});

const LC=[
  {icon:'&#128172;',title:'接收消息',desc:'Polling / WS',bg:'#42A5F5'},
  {icon:'&#128275;',title:'去重校验',desc:'Update ID',bg:'#78909C'},
  {icon:'&#128260;',title:'构建上下文',desc:'统一消息格式',bg:'#7C4DFF'},
  {icon:'&#128214;',title:'加载会话',desc:'Session History',bg:'#26C6DA'},
  {icon:'&#129302;',title:'Agent 调度',desc:'选模型 + Prompt',bg:'#AB47BC'},
  {icon:'&#9889;',title:'调用 LLM',desc:'Stream Chunks',bg:'#FF7043'},
  {icon:'&#128172;',title:'流式回复',desc:'send + edit',bg:'#66BB6A'}
];
let lcAnim=null,lcStep=0;

function renderLifecycleViz(el){
  clearInterval(lcAnim);lcStep=0;
  function draw(){
    el.innerHTML=`<div class="lifecycle">${LC.map((n,i)=>{
      const c=i===lcStep?'active-lc':i<lcStep?'':'dim-lc';
      return (i>0?`<div class="lc-arrow${i>lcStep?' dim-lc':''}">&#10132;</div>`:'')+
        `<div class="lc-node ${c}" style="background:${n.bg}"><div class="lc-icon">${n.icon}</div><div class="lc-title">${n.title}</div><div class="lc-desc">${n.desc}</div></div>`;
    }).join('')}</div>`;
  }
  draw();
  lcAnim=setInterval(()=>{lcStep=(lcStep+1)%LC.length;draw()},1100);
}

function renderStreamingViz(el){
  let frame=0;
  const full="OpenClaw 是一个基于插件架构的多渠道 AI 对话平台，支持 Telegram、飞书、Slack 等 40+ 渠道...";
  function draw(){
    const shown=full.substring(0,Math.min(frame*3,full.length));
    const done=frame*3>=full.length;
    el.innerHTML=`<div style="max-width:700px;margin:0 auto;padding:20px 0">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="background:#0088CC;color:white;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0">&#128100;</div>
        <div style="background:#f0f4f8;padding:10px 14px;border-radius:10px;font-size:.9em;color:#333">帮我介绍一下 OpenClaw</div>
      </div>
      <div style="display:flex;gap:12px;align-items:flex-start;margin-top:14px">
        <div style="background:#7C4DFF;color:white;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0">&#129302;</div>
        <div style="background:white;padding:10px 14px;border-radius:10px;font-size:.9em;border:1px solid #E0E0E0;min-width:200px;min-height:40px;color:#333">
          ${shown}${done?'':'<span style="animation:blink 1s infinite;color:#7C4DFF">|</span>'}
        </div>
      </div>
      <div style="text-align:center;margin-top:12px;font-size:.78em;color:#9E9E9E">${done?'&#9989; 回复完成':'&#9889; 流式输出中... editMessageText() x'+frame}</div>
    </div>
    <style>@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}</style>`;
    if(!done){frame++;setTimeout(draw,180)}
  }
  frame=0;draw();
}

function render(){
  const s=STEPS[currentStep];
  document.getElementById('stepNav').innerHTML=STEPS.map((st,i)=>{
    const c=i===currentStep?'active':i<currentStep?'completed':'';
    return `<li class="${c}" onclick="goToStep(${i})"><span class="dot"></span><span>${st.nav}</span></li>`;
  }).join('');
  document.getElementById('stepContent').innerHTML=`<div class="step-title-bar"><div class="step-num">${currentStep+1}</div><div class="step-title-text">${s.title}</div></div>${s.content}`;

  clearInterval(lcAnim);
  const area=document.getElementById('vizArea');
  if(s.viz==='lifecycle') renderLifecycleViz(area);
  else if(s.viz==='streaming') renderStreamingViz(area);
  else if(typeof s.viz==='function') area.innerHTML=s.viz();
  else area.innerHTML='';

  document.getElementById('progBar').max=totalSteps-1;
  document.getElementById('progBar').value=currentStep;
  document.getElementById('stepInd').textContent=`${currentStep+1} / ${totalSteps}`;
  document.getElementById('prevBtn').disabled=currentStep===0;
  document.getElementById('nextBtn').disabled=currentStep===totalSteps-1;
}

function copyCode(btn){
  const t=btn.closest('.code-block').querySelector('.code-body').textContent;
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='已复制!';setTimeout(()=>{btn.textContent='复制'},1500)});
}
render();
</script>
